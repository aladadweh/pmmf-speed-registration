    --asphalt:#0b0e11; --asphalt-2:#15181c; --red:#ce1126; --green:#007a3d;
    --parchment:#f6f3ec; --sand:#c9a06a; --yellow:#f2c300; --ink:#1a1d21;
    --muted:#8a8f96; --line:rgba(255,255,255,0.12); --radius:4px;
    --font:"Segoe UI", Tahoma, "Geeza Pro", Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-image:linear-gradient(rgba(246,243,236,0.5), rgba(246,243,236,0.5)), var(--bg-photo);
    background-size:cover; background-position:top center; background-repeat:no-repeat; background-attachment:fixed;
    background-color:var(--parchment); color:var(--ink); font-family:var(--font); direction:rtl; -webkit-font-smoothing:antialiased;
  }
  @media (max-width:768px){ body{ background-attachment:scroll; } }
  a{color:inherit;} button{font-family:inherit;cursor:pointer;} input,select,textarea{font-family:inherit;}

  .checker{
    height:10px;
    background-image:linear-gradient(45deg, var(--ink) 25%, transparent 25%, transparent 75%, var(--ink) 75%),
      linear-gradient(45deg, var(--ink) 25%, transparent 25%, transparent 75%, var(--ink) 75%);
    background-size:14px 14px; background-position:0 0, 7px 7px; background-color:var(--parchment);
  }

  .hero{
    position:relative; min-height:480px;
    background-image:linear-gradient(180deg, rgba(6,8,10,0.22) 0%, rgba(6,8,10,0.32) 55%, rgba(6,8,10,0.48) 100%), var(--bg-photo);
    background-size:cover; background-position:center 20%; color:var(--parchment); padding:28px 20px 34px; overflow:hidden;
  }
  .hero-top{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
  .brandmark{height:34px; object-fit:contain;}
  .fiamark{height:44px; object-fit:contain; opacity:0.95;}
  .member-tag{font-size:10px; letter-spacing:.08em; color:var(--muted); text-align:center; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .hero-body{margin-top:48px; max-width:640px;}
  .eyebrow{display:inline-flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.12em; color:var(--yellow);
    border:1px solid rgba(242,195,0,0.5); padding:4px 10px; border-radius:2px; background:rgba(242,195,0,0.08);}
  .hero-title{font-size:clamp(26px,5vw,40px); line-height:1.25; font-weight:800; margin:16px 0 6px;}
  .hero-sub{font-size:clamp(15px,2.6vw,19px); color:var(--sand); font-weight:700; margin:0 0 18px;}
  .hero-meta{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;}
  .meta-pill{background:rgba(255,255,255,0.08); border:1px solid var(--line); padding:8px 14px; border-radius:2px; font-size:13px; display:flex; gap:8px; align-items:baseline;}
  .meta-pill b{font-size:16px; color:var(--yellow);}
  .meta-pill.warn{border-color:var(--red); background:rgba(206,17,38,0.12);}
  .meta-pill.warn b{color:var(--red);}

  .shell{max-width:720px; margin:0 auto; padding:0 18px 80px;}

  .steps{display:flex; justify-content:space-between; margin:-1px auto 0; max-width:720px; background:var(--ink);}
  .step{flex:1; text-align:center; padding:12px 4px; font-size:12px; color:rgba(255,255,255,0.4);
    border-left:1px solid rgba(255,255,255,0.08); position:relative; transition:color .2s;}
  .step:last-child{border-left:none;}
  .step b{display:block; font-size:15px; font-weight:800; color:rgba(255,255,255,0.3); transition:color .2s;}
  .step.active{color:var(--parchment);} .step.active b{color:var(--yellow);}
  .step.done{color:rgba(255,255,255,0.75);} .step.done b{color:var(--green);}
  .step-bar{height:3px; background:var(--asphalt-2);}
  .step-bar-fill{height:100%; background:var(--yellow); width:33%; transition:width .3s;}

  .card{background:#fff; border:1px solid #e4dfd3; border-radius:var(--radius); margin-top:22px; overflow:hidden;}
  .card-head{display:flex; align-items:center; gap:12px; padding:16px 18px; background:var(--ink); color:var(--parchment);}
  .card-num{width:30px; height:30px; border-radius:50%; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex:none;}
  .card-head h3{margin:0; font-size:16px; font-weight:700;}
  .card-head span{font-size:12px; color:var(--muted); display:block; margin-top:2px;}
  .card-body{padding:20px 18px 22px;}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:560px){.grid{grid-template-columns:1fr;}}

  .field{margin-bottom:14px;}
  .field.full{grid-column:1/-1;}
  .field label{display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:var(--ink);}
  .field label .req{color:var(--red); margin-right:3px;}
  .field input[type=text], .field input[type=tel], .field input[type=email], .field input[type=number],
  .field input[type=date], .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid #d8d2c2; border-radius:2px; font-size:14px; background:#fdfcf9; color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--green); outline-offset:1px; border-color:var(--green);}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .err{font-size:12px; color:var(--red); margin-top:4px; display:none;}
  .field.invalid input, .field.invalid select{border-color:var(--red);}
  .field.invalid .err{display:block;}

  .check-row{display:flex; align-items:flex-start; gap:10px; background:#fbf8f1; border:1px solid #e4dfd3; border-radius:2px; padding:12px 14px; margin-bottom:12px;}
  .check-row input{margin-top:3px;}
  .check-row label{font-size:13px; line-height:1.6;}
  .check-row.invalid{border-color:var(--red); background:#fdf2f2;}

  .doc-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:560px){.doc-grid{grid-template-columns:1fr;}}
  .doc-card{border:1.5px dashed #cfc7b1; border-radius:2px; padding:14px; text-align:center; position:relative; background:#fdfcf9; transition:border-color .15s;}
  .doc-card.filled{border-style:solid; border-color:var(--green); background:#f3f9f4;}
  .doc-card.invalid{border-color:var(--red);}
  .doc-card .doc-label{font-size:13px; font-weight:700; margin-bottom:8px;}
  .doc-card .doc-sub{font-size:11px; color:var(--muted); margin-bottom:10px;}
  .doc-card input[type=file]{display:none;}
  .doc-btn{display:inline-block; border:1px solid var(--ink); background:var(--ink); color:#fff; font-size:12.5px; padding:7px 14px; border-radius:2px;}
  .doc-card.filled .doc-btn{background:var(--green); border-color:var(--green);}
  .doc-preview{margin-top:10px; max-width:100%; max-height:110px; border-radius:2px; display:none;}
  .doc-file-name{font-size:11px; color:var(--green); margin-top:6px; word-break:break-all; display:none;}
  .doc-remove{position:absolute; top:8px; left:8px; background:var(--red); color:#fff; border:none; width:20px; height:20px; border-radius:50%; font-size:12px; line-height:1; display:none;}

  .nav-row{display:flex; justify-content:space-between; align-items:center; margin-top:22px; gap:10px;}
  .btn-next, .btn-submit{background:var(--red); color:#fff; border:none; font-size:15px; font-weight:800; padding:14px 32px; border-radius:2px; letter-spacing:.02em; box-shadow:0 6px 0 rgba(0,0,0,0.15); transition:transform .1s;}
  .btn-next:active, .btn-submit:active{transform:translateY(4px); box-shadow:none;}
  .btn-submit:disabled, .btn-next:disabled{background:#b8b2a4; box-shadow:none; cursor:not-allowed;}
  .btn-back{background:transparent; border:1px solid var(--ink); color:var(--ink); font-size:14px; font-weight:700; padding:13px 26px; border-radius:2px;}
  .submit-note{font-size:12px; color:var(--muted); margin-top:10px; text-align:center;}
  .form-msg{max-width:420px; margin:14px auto 0; font-size:13px; color:var(--red); text-align:center; display:none;}

  .closed-banner{max-width:720px; margin:0 auto; padding:60px 20px; text-align:center;}
  .closed-banner .flag{font-size:46px; margin-bottom:14px;}
  .closed-banner h2{font-size:22px; margin:0 0 10px;}
  .closed-banner p{color:var(--muted); font-size:14px; max-width:420px; margin:0 auto;}

  .success-wrap{max-width:520px; margin:0 auto; padding:60px 20px; text-align:center;}
  .success-badge{width:76px; height:76px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 18px;}
  .race-number{display:inline-block; background:var(--ink); color:var(--yellow); font-size:30px; font-weight:800; padding:10px 26px; border-radius:2px; margin:14px 0; letter-spacing:.05em;}
  .btn-secondary{display:inline-block; margin-top:16px; border:1px solid var(--ink); background:transparent; color:var(--ink); padding:10px 22px; border-radius:2px; font-size:13px; font-weight:700;}

  footer{text-align:center; padding:26px 16px 40px; font-size:11.5px; color:var(--muted);}
  .admin-gear{background:none; border:none; color:var(--muted); font-size:11px; text-decoration:underline; margin-top:8px;}

  .overlay{position:fixed; inset:0; background:rgba(11,14,17,0.82); display:none; align-items:center; justify-content:center; padding:16px; z-index:50;}
  .overlay.open{display:flex;}
  .overlay-box{background:#fff; border-radius:4px; max-width:880px; width:100%; max-height:88vh; overflow:auto; padding:20px;}
  .overlay-box h3{margin-top:0;}
  .admin-table{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:10px;}
  .admin-table th, .admin-table td{border:1px solid #e4dfd3; padding:6px 8px; text-align:right;}
  .admin-table th{background:#f6f3ec;}
  .admin-del-btn{background:var(--red); color:#fff; border:none; padding:5px 10px; border-radius:2px; font-size:11.5px; cursor:pointer;}
  .admin-del-btn:disabled{opacity:0.5; cursor:default;}
  .admin-close{float:left; border:none; background:none; font-size:20px; cursor:pointer;}
  .admin-login input{width:100%; padding:10px; margin:10px 0; border:1px solid #d8d2c2;}
  .admin-actions{display:flex; gap:10px; margin:14px 0; flex-wrap:wrap;}
  .admin-actions button{border:1px solid var(--ink); background:var(--ink); color:#fff; padding:8px 14px; border-radius:2px; font-size:12px;}
  .admin-actions button.danger{background:var(--red); border-color:var(--red);}
  .admin-actions button.ghost{background:transparent; color:var(--ink);}
  .loading-note{text-align:center; padding:60px 20px; color:var(--muted);}

  .setup-banner{max-width:640px; margin:40px auto; padding:22px 24px; background:#fdf2d8; border:1px solid var(--yellow); border-radius:4px; font-size:13.5px; line-height:1.9;}
  .setup-banner code{background:#fff; padding:2px 6px; border-radius:2px; border:1px solid #e4dfd3; direction:ltr; display:inline-block;}

  /* ---------------- Responsive ---------------- */
  @media (max-width:768px){
    .hero{padding:20px 16px 26px;}
    .hero-body{margin-top:34px;}
    .shell{padding:0 14px 60px;}
    .card-body{padding:16px 14px 18px;}
    .overlay-box{padding:16px; max-height:92vh;}
  }
  @media (max-width:640px){
    .hero-meta{gap:8px;}
    .meta-pill{padding:6px 10px; font-size:12px;}
    .step{font-size:11px; padding:10px 3px;}
    .nav-row{flex-wrap:wrap;}
    .btn-back, .btn-next, .btn-submit{flex:1 1 auto; text-align:center; padding:13px 18px;}
    .admin-table{font-size:11.5px;}
    .admin-table th, .admin-table td{padding:5px 6px;}
  }
  @media (max-width:420px){
    .brandmark{height:28px;}
    .fiamark{height:36px;}
    .member-tag{font-size:9px;}
    .hero-title{margin:12px 0 4px;}
    .card-head{padding:14px 14px;}
    .card-head h3{font-size:15px;}
    .step b{display:block;}
    .step{font-size:10px;}
    .doc-card{padding:10px;}
  }
</style>
</head>

  <div class="overlay-box">
    <button class="admin-close" id="adminCloseBtn">×</button>
    <div id="adminContent"></div>
  </div>

function esc(s){ return (s||"").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(action, extra){
  const res = await fetch(CONFIG.API_URL, { method:'POST', body: JSON.stringify(Object.assign({action}, extra||{})) });
  return res.json();
}

// ---------------- rendering shells ----------------
function heroBlock(){
  const s = state.status || {count:0, cap:60, daysLeft:10, closed:false};
  const remaining = Math.max(0, s.cap - s.count);
  return `
  <div class="hero">
    <div class="hero-top">
      <img class="brandmark" src="${ASSETS.pmmf}" alt="PMMF">
      <div class="member-tag"><span>MEMBER OF</span><img class="fiamark" src="${ASSETS.fia}" alt="FIA"></div>
    </div>
    <div class="hero-body">
      <span class="eyebrow">الجولة الأولى &nbsp;•&nbsp; 2026</span>
      <div class="hero-title">طلب اشتراك في<br>سباق الدرفت</div>
      <div class="hero-sub">الاتحاد الفلسطيني لرياضة السيارات والدراجات النارية</div>
      <div class="hero-meta">
        <div class="meta-pill ${remaining<=10?'warn':''}">المقاعد المتبقية <b>${remaining}</b> / ${s.cap}</div>
        <div class="meta-pill ${s.daysLeft<=3?'warn':''}">أيام متبقية للتسجيل <b>${s.daysLeft}</b></div>
      </div>
    </div>
  </div>
  <div class="checker"></div>`;
}

function footerBlock(){
  return `<footer>
    الاتحاد الفلسطيني لرياضة السيارات والدراجات النارية — عضو في FIA<br>
    <button class="admin-gear" id="openAdmin">لوحة تحكم الاتحاد</button>
  </footer>`;
}

function setupBanner(){
  return `
  <div class="setup-banner">
    <b>لم يتم ضبط رابط قاعدة البيانات بعد.</b><br><br>
    هذا الفورم يحتاج ربطًا بنسخة Google Apps Script الخاصة بك ليعمل فعليًا لاستقبال الطلبات.<br>
    افتح ملف الكود، وضع رابط الويب أب داخل المتغيّر:<br>
    <code>const CONFIG = { API_URL: "https://script.google.com/macros/s/AKfycbweubuNe7fbUKUZtjm2d152AvPAfilEDqi47axGguodmQsWo7Ht7eqfW4uT0AvY7Zpz/exec" };</code><br><br>
    راجع خطوات النشر التي أرسلها Claude في المحادثة.
  </div>`;
}

function stepBar(){
  const labels = ['بيانات المتسابق','بيانات السيارة','المستندات والإرسال'];
  return `
  <div class="steps">
    ${labels.map((l,i)=>{
      const n=i+1;
      const cls = n===state.step ? 'active' : (n<state.step ? 'done':'');
      return `<div class="step ${cls}"><b>0${n}</b>${l}</div>`;
    }).join('')}
  </div>
  <div class="step-bar"><div class="step-bar-fill" style="width:${(state.step/3)*100}%"></div></div>`;
}

function closedScreen(){
  const s = state.status;
  const reason = s.count>=s.cap ? "تم الوصول للعدد الأقصى من المشاركين (60 متسابقًا)." :
                 (s.daysLeft<=0 ? "انتهت المدة المخصصة لاستقبال طلبات الاشتراك." :
                 "تم إغلاق باب التسجيل من قبل إدارة الاتحاد.");
  return `${heroBlock()}
  <div class="closed-banner">
    <div class="flag">🏁</div>
    <h2>التسجيل مغلق حاليًا</h2>
    <p>${reason} يمكنكم التواصل مع الاتحاد للاستفسار عن الجولات القادمة.</p>
  </div>${footerBlock()}`;
}

function docCard(doc){
  return `
  <div class="doc-card" id="doccard_${doc.key}">
    <button type="button" class="doc-remove" id="docremove_${doc.key}">×</button>
    <div class="doc-label">${doc.label} <span style="color:#ce1126">*</span></div>
    <div class="doc-sub">${doc.sub}</div>
    <label class="doc-btn">اختر ملف<input type="file" accept="image/*,.pdf" id="docinput_${doc.key}"></label>
    <img class="doc-preview" id="docpreview_${doc.key}">
    <div class="doc-file-name" id="docname_${doc.key}"></div>
  </div>`;
}

// ---------------- boot ----------------
async function boot(){
  if(!CONFIG.API_URL){
    app.innerHTML = heroBlock() + setupBanner() + footerBlock();
    wireFooter();
    return;
  }
  try{
    state.status = await api('status');
  }catch(err){
    app.innerHTML = heroBlock() + `<div class="setup-banner">تعذّر الاتصال بقاعدة البيانات. تأكد أن رابط Apps Script صحيح وأن النشر تم بصلاحية "Anyone".</div>` + footerBlock();
    wireFooter();
    return;
  }
  if(state.status.closed){ app.innerHTML = closedScreen(); wireFooter(); return; }
  app.innerHTML = wizardScreen();
  wireWizard();
  wireFooter();
  goStep(1);
}

function wireFooter(){
  const b = document.getElementById('openAdmin');
  if(b) b.addEventListener('click', openAdminGate);
}

function goStep(n){
  state.step = n;
  state.maxStep = Math.max(state.maxStep, n);
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display = (Number(c.dataset.step) === n) ? '' : 'none';
  });
  const bar = document.querySelector('.step-bar-fill');
  if(bar) bar.style.width = (n/3*100)+'%';
  document.querySelectorAll('.step').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i+1===n) el.classList.add('active');
    else if(i+1<n) el.classList.add('done');
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function fieldError(id, show){
  const el = document.getElementById('f_'+id);
  if(el) el.classList.toggle('invalid', show);
}
function val(id){ return document.getElementById(id).value.trim(); }

function validateStep1(){
  let ok = true;
  const req = ['nationalId','dob','phone','city','category','emergencyName','emergencyPhone',
    'assistantNationalId','assistantAge','assistantPhone','assistantCity'];
  req.forEach(k=>{ const bad = !val(k); fieldError(k, bad); if(bad) ok=false; });
  const nameParts = val('fullName').split(/\s+/).filter(Boolean);
  const nameBad = nameParts.length < 3 || nameParts.length > 4;
  fieldError('fullName', nameBad);
  if(nameBad) ok=false;
  const assistantNameParts = val('assistantFullName').split(/\s+/).filter(Boolean);
  const assistantNameBad = assistantNameParts.length < 3 || assistantNameParts.length > 4;
  fieldError('assistantFullName', assistantNameBad);
  if(assistantNameBad) ok=false;
  const assistantAge = val('assistantAge');
  const assistantAgeBad = !assistantAge || Number(assistantAge) < 19;
  fieldError('assistantAge', assistantAgeBad);
  if(assistantAgeBad) ok=false;
  const email = val('email');
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ fieldError('email', true); ok=false; }
  const phone = val('phone');
  if(phone && phone.replace(/\D/g,'').length < 8){ fieldError('phone', true); ok=false; }
  return ok;
}
function validateStep2(){
  let ok = true;
  ['carModel','carYear','carPlate','drivetrain'].forEach(k=>{ const bad=!val(k); fieldError(k,bad); if(bad) ok=false; });
  return ok;
}
function validateStep3(){
  let ok = true;
  DOCS.forEach(doc=>{
    const card = document.getElementById('doccard_'+doc.key);
    const missing = !state.files[doc.key];
    card.classList.toggle('invalid', missing);
    if(missing) ok=false;
  });
  const waiver = document.getElementById('waiver').checked;
  const terms = document.getElementById('terms').checked;
  document.getElementById('row_waiver').classList.toggle('invalid', !waiver);
  document.getElementById('row_terms').classList.toggle('invalid', !terms);
  if(!waiver || !terms) ok=false;
  return ok;
}

function compressImage(file){
  return new Promise((resolve, reject)=>{
    if(!file.type.startsWith('image/')){
      const reader = new FileReader();
      reader.onload = ()=>resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
      return;
    }
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e)=>{
      img.onload = ()=>{
        const maxW = 1100;
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h*maxW/w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function wireWizard(){
  document.getElementById('toStep2').addEventListener('click', ()=>{ if(validateStep1()) goStep(2); else scrollToFirstInvalid(); });
  document.getElementById('toStep1').addEventListener('click', ()=> goStep(1));
  document.getElementById('toStep3').addEventListener('click', ()=>{ if(validateStep2()) goStep(3); else scrollToFirstInvalid(); });
  document.getElementById('toStep2b').addEventListener('click', ()=> goStep(2));

  DOCS.forEach(doc=>{
    const input = document.getElementById('docinput_'+doc.key);
    const card = document.getElementById('doccard_'+doc.key);
    const preview = document.getElementById('docpreview_'+doc.key);
    const nameEl = document.getElementById('docname_'+doc.key);
    const removeBtn = document.getElementById('docremove_'+doc.key);

    input.addEventListener('change', async ()=>{
      const file = input.files[0];
      if(!file) return;
      if(file.size > 4*1024*1024){ alert('حجم الملف كبير جدًا (الحد الأقصى 4 ميغابايت): '+doc.label); input.value=''; return; }
      const dataUrl = await compressImage(file);
      state.files[doc.key] = {name:file.name, dataUrl};
      card.classList.add('filled'); card.classList.remove('invalid');
      nameEl.textContent = file.name; nameEl.style.display='block';
      removeBtn.style.display='block';
      if(dataUrl.startsWith('data:image')){ preview.src=dataUrl; preview.style.display='block'; }
      else preview.style.display='none';
    });
    removeBtn.addEventListener('click', ()=>{
      delete state.files[doc.key]; input.value='';
      card.classList.remove('filled'); preview.style.display='none';
      nameEl.style.display='none'; removeBtn.style.display='none';
    });
  });

  document.getElementById('submitBtn').addEventListener('click', onSubmit);
}

function scrollToFirstInvalid(){
  document.querySelector('.invalid')?.scrollIntoView({behavior:'smooth', block:'center'});
}

async function onSubmit(){
  if(state.submitting) return;
  if(!validateStep3()){ scrollToFirstInvalid(); return; }

  const msg = document.getElementById('formMsg');
  msg.style.display='none';

  const entry = {
    fullName: val('fullName'), nationalId: val('nationalId'), dob: val('dob'), phone: val('phone'),
    email: val('email'), city: val('city'), category: val('category'), experience: val('experience'),
    bloodType: val('bloodType'), emergencyName: val('emergencyName'), emergencyPhone: val('emergencyPhone'),
    assistant:{
      fullName: val('assistantFullName'), nationalId: val('assistantNationalId'),
      age: val('assistantAge'), phone: val('assistantPhone'), city: val('assistantCity')
    },
    car:{
      carModel: val('carModel'), carYear: val('carYear'), carPlate: val('carPlate'), carColor: val('carColor'),
      drivetrain: val('drivetrain'),
      hasRollCage: document.getElementById('hasRollCage').checked,
      hasFireExt: document.getElementById('hasFireExt').checked,
      hasHarness: document.getElementById('hasHarness').checked
    },
    files: state.files
  };

  state.submitting = true;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الإرسال...';

  let result;
  try{
    result = await api('register', {payload: entry});
  }catch(err){
    result = {error:'network'};
  }

  if(result.error){
    state.submitting = false; btn.disabled = false; btn.textContent = 'إرسال طلب الاشتراك 🏁';
    const map = {
      duplicate: 'رقم الهوية هذا مسجّل مسبقًا. لا يمكن التسجيل أكثر من مرة واحدة لكل متسابق.',
      closed: 'تم إغلاق التسجيل (اكتمل العدد أو انتهت المدة).',
      network: 'تعذّر الاتصال بالخادم. تأكد من اتصالك بالإنترنت وحاول مجددًا.'
    };
    msg.textContent = map[result.error] || 'حدث خطأ غير متوقع، حاول مرة أخرى.';
    msg.style.display='block';
    return;
  }

  await buildAndDownloadZip(entry, result.raceNumber);
  app.innerHTML = successScreen(entry, result.raceNumber);
  wireFooter();
  document.getElementById('downloadAgain')?.addEventListener('click', ()=> buildAndDownloadZip(entry, result.raceNumber));
}

async function buildAndDownloadZip(entry, raceNumber){
  try{
    const zip = new JSZip();
    const folder = zip.folder(entry.fullName + ' - ' + entry.nationalId);
    const info = `الاتحاد الفلسطيني لرياضة السيارات والدراجات النارية
طلب اشتراك - سباق الدرفت - الجولة الأولى لعام 2026
------------------------------------------------
رقم التسجيل: #${String(raceNumber).padStart(2,'0')}
الاسم الكامل: ${entry.fullName}
رقم الهوية: ${entry.nationalId}
رقم الجوال: ${entry.phone}
الفئة: ${entry.category}
اسم المساعد: ${entry.assistant.fullName}
هوية المساعد: ${entry.assistant.nationalId}
عمر المساعد: ${entry.assistant.age}
جوال المساعد: ${entry.assistant.phone}
مدينة المساعد: ${entry.assistant.city}
موديل السيارة: ${entry.car.carModel}
رقم اللوحة: ${entry.car.carPlate}
`;
    folder.file('بيانات_المتسابق.txt', info);
    DOCS.forEach(doc=>{
      const f = entry.files[doc.key];
      if(!f) return;
      const isImg = f.dataUrl.startsWith('data:image');
      const ext = isImg ? (f.dataUrl.includes('image/png') ? 'png':'jpg') : (f.name.split('.').pop()||'pdf');
      folder.file(doc.label+'.'+ext, f.dataUrl.split(',')[1], {base64:true});
    });
    const blob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (entry.fullName||'مشترك') + ' - وثائق التسجيل.zip';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }catch(err){ console.error('zip failed', err); }
}

// ---------------- Admin ----------------
function openAdminGate(){
  if(!CONFIG.API_URL){ alert('اضبط رابط قاعدة البيانات أولاً.'); return; }
  const overlay = document.getElementById('adminOverlay');
  const content = document.getElementById('adminContent');
  content.innerHTML = `
    <h3>لوحة تحكم الاتحاد</h3>
    <div class="admin-login">
      <input type="password" id="adminPass" placeholder="كلمة المرور">
      <button id="adminGo" style="background:var(--ink);color:#fff;border:none;padding:10px 18px;border-radius:2px;">دخول</button>
    </div>`;
  overlay.classList.add('open');
  document.getElementById('adminGo').addEventListener('click', async ()=>{
    const pass = document.getElementById('adminPass').value;
    const res = await api('admin', {pass});
    if(res.error){ alert('كلمة مرور غير صحيحة أو خطأ في الاتصال'); return; }
    renderAdminPanel(res, pass);
  });
}

function renderAdminPanel(res, pass){
  const content = document.getElementById('adminContent');
  const s = res.status;
  const isClosed = s.closed && s.count < s.cap && s.daysLeft > 0; // مغلق يدويًا
  content.innerHTML = `
    <h3>لوحة تحكم الاتحاد</h3>
    <p>عدد المسجلين: <b>${s.count}</b> / ${s.cap} — أيام متبقية: <b>${s.daysLeft}</b></p>
    <div class="admin-actions">
      <button id="toggleCloseBtn" class="${isClosed?'ghost':'danger'}">${isClosed?'إعادة فتح التسجيل':'إغلاق التسجيل الآن'}</button>
    </div>
    <div style="overflow:auto;">
    <table class="admin-table">
      <tr><th>#</th><th>الاسم</th><th>رقم الهوية</th><th>الجوال</th><th>الفئة</th><th>المساعد</th><th>السيارة</th><th>مجلد المستندات</th><th>حذف</th></tr>
      ${res.entries.map(en=>`
        <tr>
          <td>${en.raceNumber}</td><td>${esc(en.fullName)}</td><td>${esc(en.nationalId)}</td>
          <td>${esc(en.phone)}</td><td>${esc(en.category)}</td><td>${esc(en.assistantFullName)}</td><td>${esc(en.carModel)}</td>
          <td><a href="${en.folderUrl}" target="_blank">فتح في Drive</a></td>
          <td><button class="admin-del-btn" data-id="${esc(en.nationalId)}">حذف</button></td>
        </tr>`).join('')}
    </table></div>`;

  document.getElementById('toggleCloseBtn').addEventListener('click', async ()=>{
    await api('toggleClose', {pass});
    document.getElementById('adminOverlay').classList.remove('open');
    boot();
  });

  content.querySelectorAll('.admin-del-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('هل أنت متأكد من حذف هذا المتسابق؟ سيتحرر رقمه من العدد الكلي.')) return;
      btn.disabled = true;
      const delRes = await api('delete', {pass, nationalId: btn.dataset.id});
      if(delRes.error){ alert('تعذّر الحذف: ' + delRes.error); btn.disabled = false; return; }
      const fresh = await api('admin', {pass});
      renderAdminPanel(fresh, pass);
    });
  });
}

document.getElementById('adminCloseBtn').addEventListener('click', ()=>{
  document.getElementById('adminOverlay').classList.remove('open');
});

boot();

})();
